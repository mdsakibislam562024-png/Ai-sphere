<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SPHERE - Sakib</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/DyLVPN3z/1778367632213.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/DyLVPN3z/1778367632213.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header">MENU <i class="fas fa-times" onclick="toggleSidebar()"></i></div>
    <div class="sidebar-item" onclick="openSettings()"><i class="fas fa-cog"></i> Settings</div>
    <div class="sidebar-item" onclick="openPrivacy()"><i class="fas fa-shield-alt"></i> Privacy</div>
    <div class="sidebar-item" onclick="openAbout()"><i class="fas fa-info-circle"></i> About</div>
    <div class="sidebar-item" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </div>
</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<div id="onboarding-wrapper">
    <div class="auth-container">
        <h2 id="auth-title">AI SPHERE</h2><br>
        <input type="email" id="email" class="auth-in" placeholder="Email">
        <input type="password" id="password" class="auth-in" placeholder="Password">
        <button class="btn-auth" id="authBtn" onclick="handleAuth()">Login</button>
        <p onclick="toggleAuthMode()" id="auth-switch">Don't have an account? Sign Up</p>
        <p id="auth-status"></p>
    </div>
</div>

<div id="home-page" style="display:none;">
    <div class="top-header">
        <i class="fas fa-bars" onclick="toggleSidebar()"></i>
        <div class="logo">AI SPHERE</div>
        <div style="display:flex; gap:15px;">
            <i class="fas fa-bell"></i>
            <i class="fab fa-facebook-messenger" onclick="nav('messages')"></i>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-home" onclick="nav('home')"><i class="fas fa-home"></i>Home</div>
        <div class="tab" id="tab-reels" onclick="nav('reels')"><i class="fas fa-bolt"></i>Reels</div>
        <div class="tab" onclick="alert('Friends Section Coming Soon!')"><i class="fas fa-users"></i>Friends</div>
        <div class="tab" onclick="alert('Stats Section Coming Soon!')"><i class="fas fa-chart-bar"></i>Stats</div>
        <div class="tab" id="tab-profile" onclick="nav('profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <div class="content-area">
        <div id="hero-section">
            <div class="main-container">
                <div class="earth-container" onclick="nav('global-feed')" style="cursor: pointer;">
                    <img src="https://i.postimg.cc/h4rxPrY3/1778359158913.png" class="earth-img">
                </div>
                <div class="user-bubble b-top"><img src="https://i.pravatar.cc/100?u=11"></div>
                <div class="user-bubble b-bottom"><img src="https://i.pravatar.cc/100?u=12"></div>
                <div class="user-bubble b-left"><img src="https://i.pravatar.cc/100?u=13"></div>
                <div class="user-bubble b-right"><img src="https://i.pravatar.cc/100?u=14"></div>
            </div>
            <p style="margin-top:40px; font-size:11px; color:var(--accent); letter-spacing:2px; font-weight:bold;">WELCOME, SAKIB</p>
        </div>

        <div id="global-feed-section" style="display:none;">
            <div class="feed-header" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-arrow-left" onclick="nav('home')"></i>
                <h2 style="font-size: 18px; color: var(--accent);">Global Feed</h2>
            </div>

            <div class="post-box" style="margin: 0 15px 20px 15px; padding: 15px; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color);">
                <textarea id="post-input" placeholder="আজকের ভাবনা কী?" style="width: 100%; background: transparent; border: none; color: var(--text-color); outline: none; font-size: 14px; resize: none;"></textarea>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                    <label for="post-image-input" style="cursor: pointer; color: var(--accent); font-size: 13px;">
                        <i class="fas fa-image" style="margin-right: 5px;"></i> ছবি / ভিডিও
                    </label>
                    <input type="file" id="post-image-input" accept="image/*, video/*" style="display: none;">
                    
                    <button onclick="handlePostSubmit()" style="background: var(--accent); color: black; border: none; padding: 5px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">Post</button>
                </div>
            </div>
            <div id="post-display-area" style="padding: 0 15px;"></div>
        </div>

        <div id="reels-section" style="display:none; height: calc(100vh - 120px); background: #000; overflow-y: scroll; scroll-snap-type: y mandatory; border-radius: 20px; margin: 0 10px;">
        </div>

        <div id="messages-section" style="display:none; padding: 20px; text-align: center;">
            <h2 style="color: var(--accent);">Messages</h2>
            <p style="color: #666; margin-top: 20px;">আপনার বন্ধুদের সাথে চ্যাট শুরু করুন।</p>
        </div>
<div id="profile-page" style="display:none;">
    <div class="cover-photo" style="position: relative; height: 160px; background: #222; overflow: hidden;">
        <img src="https://i.postimg.cc/mD363rVj/abstract-technology-background.jpg" id="my-cover-img" style="width: 100%; height: 100%; object-fit: cover;">
        
        <label for="cover-upload" style="position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px; cursor: pointer; color: white; font-size: 14px; z-index: 100; border: 1px solid rgba(255,255,255,0.3);">
            <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="cover-upload" style="display:none;" accept="image/*" onchange="updateProfileMedia('cover')">
    </div>
    
    <div class="profile-header-info" style="text-align: center; margin-top: -50px;">
        <div class="profile-pic-box" style="position: relative; display: inline-block;">
            <img src="https://i.postimg.cc/85zXp9mX/user-placeholder.png" id="my-profile-img" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg-dark); object-fit: cover;">
            <label for="profile-upload" style="position: absolute; bottom: 5px; right: 5px; background: var(--accent); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg-dark); z-index: 100;">
                <i class="fas fa-camera" style="font-size: 14px; color: #000;"></i>
            </label>
            <input type="file" id="profile-upload" style="display:none;" accept="image/*" onchange="updateProfileMedia('profile')">
        </div>
        
        <h2 id="profile-name" style="margin-top: 10px;">SAKIB</h2>
        <p id="d-bio">Cyber Security Expert | Developer</p>
        <button class="btn-auth" style="width:auto; padding:10px 30px; border-radius:20px; margin-bottom: 20px;" onclick="alert('Bio Edit Coming Soon!')">Edit Bio</button>
    </div>
    <div id="user-posts-area" style="padding: 0 15px;"></div>
</div>


<script src="script.js"></script
  
</body>
</html>
