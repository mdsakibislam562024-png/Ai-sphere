<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SPHERE - Sakib</title>
    
    <!-- লাইব্রেরি ও ফন্ট -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- তোমার আলাদা করা CSS ফাইল লিঙ্ক -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- সাইডবার ও ওভারলে -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">MENU <i class="fas fa-times" onclick="toggleSidebar()"></i></div>
    <div class="sidebar-item"><i class="fas fa-cog"></i> Settings</div>
    <div class="sidebar-item"><i class="fas fa-shield-alt"></i> Privacy</div>
    <div class="sidebar-item"><i class="fas fa-info-circle"></i> About</div>
    <div class="sidebar-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Logout</div>
</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- ৩. অথেনটিকেশন সেকশন -->
<div id="onboarding-wrapper">
    <div class="auth-container">
        <h2 id="auth-title">AI SPHERE</h2><br>
        <input type="email" id="email" class="auth-in" placeholder="Email">
        <input type="password" id="password" class="auth-in" placeholder="Password">
        <button class="btn-auth" id="authBtn" onclick="handleAuth()">Login</button>
        <p onclick="toggleAuthMode()" id="auth-switch">Don't have an account? Sign Up</p>
        <p id="auth-status"></p>
    </div>
</div>

<!-- ৪. মেইন হোম পেজ -->
<div id="home-page" style="display:none;">
    <div class="top-header">
        <i class="fas fa-bars" onclick="toggleSidebar()"></i>
        <div class="logo">AI SPHERE</div>
        <div style="display:flex; gap:15px;">
            <i class="fas fa-bell"></i>
            <i class="fab fa-facebook-messenger" onclick="nav('messages')"></i>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-home" onclick="nav('home')"><i class="fas fa-home"></i>Home</div>
        <div class="tab" id="tab-reels" onclick="nav('reels')"><i class="fas fa-bolt"></i>Reels</div>
        <div class="tab" onclick="alert('Friends Section')"><i class="fas fa-users"></i>Friends</div>
        <div class="tab" onclick="alert('Stats Data')"><i class="fas fa-chart-bar"></i>Stats</div>
        <div class="tab" id="tab-profile" onclick="nav('profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <div class="content-area">
        <!-- Home Section -->
        <div id="hero-section">
            <div class="main-container">
                <div class="earth-container" onclick="nav('global-feed')" style="cursor: pointer;">
                    <img src="https://i.postimg.cc/h4rxPrY3/1778359158913.png" class="earth-img">
                </div>
                <div class="user-bubble b-top"><img src="https://i.pravatar.cc/100?u=11"></div>
                <div class="user-bubble b-bottom"><img src="https://i.pravatar.cc/100?u=12"></div>
                <div class="user-bubble b-left"><img src="https://i.pravatar.cc/100?u=13"></div>
                <div class="user-bubble b-right"><img src="https://i.pravatar.cc/100?u=14"></div>
            </div>
            <p style="margin-top:40px; font-size:11px; color:var(--accent); letter-spacing:2px; font-weight:bold;">WELCOME, SAKIB</p>
        </div>

        <!-- গ্লোবাল ফিড সেকশন -->
        <div id="global-feed-section" style="display:none;">
            <div class="feed-header" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-arrow-left" onclick="nav('home')"></i>
                <h2 style="font-size: 18px; color: var(--accent);">Global Feed</h2>
            </div>
            <div class="post-bar" style="background: #111; padding: 15px; border-radius: 15px; margin: 0 15px 20px 15px; border: 1px solid #222;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <img src="https://i.postimg.cc/85zXp9mX/user-placeholder.png" style="width: 40px; height: 40px; border-radius: 50%;">
                    <input type="text" id="post-input" placeholder="আপনার মনে কী আছে, সাকিব?" style="background: transparent; border: none; color: white; width: 100%; outline: none;">
                </div>
                <hr style="border: 0.1px solid #333; margin: 15px 0;">
                <div style="display: flex; justify-content: space-between;">
                    <button class="btn-auth" onclick="handlePostSubmit()" style="width: auto; padding: 5px 20px; border-radius: 20px; font-size: 12px;">Post</button>
                </div>
            </div>
            <div id="post-display-area" style="padding: 0 15px;"></div>
        </div>

        <!-- Profile Section -->
        <div id="profile-page" style="display:none;">
            <div class="cover-photo"><img src="https://i.postimg.cc/mD363rVj/abstract-technology-background.jpg"></div>
            <div class="profile-header-info">
                <div class="profile-pic-box"><img src="https://i.postimg.cc/85zXp9mX/user-placeholder.png" id="d-pic"></div>
                <h2 id="d-name">SAKIB</h2>
                <p id="d-bio">Cyber Security Expert | Developer</p>
                <button class="btn-auth" style="width:auto; padding:10px 30px; border-radius:20px; margin-bottom: 20px;" onclick="openEdit()">Edit Profile</button>
            </div>
            <div style="padding: 0 15px 20px 15px;">
                <h3 style="color: var(--accent); font-size: 15px; border-bottom: 1px solid #222; padding-bottom: 10px;">MY POSTS</h3>
                <div id="user-posts-area"></div>
            </div>
        </div>
    </div>
</div>

<!-- ৫. এডিট পেজ -->
<div id="edit-page" style="display:none;">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;"><i class="fas fa-arrow-left" onclick="closeEdit()"></i><h2>Edit Profile</h2></div>
    <div class="in-grp"><label>NAME</label><input type="text" id="i-name"></div>
    <div class="in-grp"><label>BIO</label><input type="text" id="i-bio"></div>
    <button class="btn-auth" onclick="saveAll()">SAVE CHANGES</button>
</div>

<!-- তোমার আলাদা করা JavaScript ফাইল লিঙ্ক -->
<script src="script.js"></script>

</body>
</html>
