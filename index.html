<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Sphere | Pro Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-blue: #00d4ff;
            --nav-bg: rgba(0, 0, 0, 0.95);
        }

        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* স্প্ল্যাশ স্ক্রিন */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #001fcc 0%, #000000 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s ease; }
        
        /* হেডার */
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--nav-bg); display: none; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 2100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-btn { font-size: 20px; color: var(--accent-blue); cursor: pointer; }

        /* বটম নেভিগেশন */
        .nav-bar { background: var(--nav-bg); padding: 10px 0; display: flex; justify-content: space-around; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); position: fixed; top: 60px; left: 0; z-index: 1000; }
        .nav-item { color: #94a3b8; text-decoration: none; display: flex; flex-direction: column; align-items: center; flex: 1; font-size: 9px; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }

        /* সাইডবার */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--nav-bg); backdrop-filter: blur(15px); z-index: 3000; transition: 0.4s; border-right: 1px solid rgba(0, 212, 255, 0.2); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; text-align: right; }
        .sidebar-menu { flex-grow: 1; padding: 15px; }
        .sidebar-item { display: flex; align-items: center; padding: 14px 12px; color: var(--text-color); cursor: pointer; border-radius: 10px; margin-bottom: 5px; }
        .sidebar-item i { margin-right: 15px; color: var(--accent-blue); width: 20px; }
        .sidebar-footer { padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .logout-btn { color: #ff4d4d !important; font-weight: bold; }

        /* কন্টেন্ট */
        .main-content { margin-top: 140px; padding: 20px; text-align: center; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* পৃথিবী ও অরবিট */
        .earth-wrapper { position: relative; width: 220px; height: 220px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .main-earth-img { width: 170px; height: 170px; animation: smoothFloat 6s infinite ease-in-out; filter: drop-shadow(0 0 35px rgba(0, 212, 255, 0.4)); }
        .photo-orbit { position: absolute; width: 135%; height: 135%; animation: orbitSpin 15s infinite linear; }
        .mini-pic { position: absolute; width: 30px; height: 30px; border: 2px solid #fff; border-radius: 50%; background-size: cover; }
        @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes smoothFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .p1 { top: 0; left: 50%; transform: translateX(-50%); background-image: url('https://i.pravatar.cc/100?u=1'); }
        .p2 { top: 50%; right: 0; transform: translateY(-50%); background-image: url('https://i.pravatar.cc/100?u=2'); }
        .p3 { bottom: 0; left: 50%; transform: translateX(-50%); background-image: url('https://i.pravatar.cc/100?u=3'); }
        .p4 { top: 50%; left: 0; transform: translateY(-50%); background-image: url('https://i.pravatar.cc/100?u=4'); }

        .card { background: rgba(255,255,255,0.07); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #0044ff, #00d4ff); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen"><h1>AI-SPHERE</h1></div>

    <div id="top-header" class="header-bar">
        <div class="header-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></div>
        <div style="font-weight: bold; color: var(--accent-blue); letter-spacing: 2px;">AI SPHERE</div>
        <div class="header-btn" onclick="showSection('chat-view')"><i class="fa-solid fa-comment-dots"></i></div>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header"><i class="fa-solid fa-arrow-left" style="cursor:pointer; color:var(--accent-blue);" onclick="toggleSidebar()"></i></div>
        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="showSection('dashboard-view')"><i class="fa-solid fa-gauge-high"></i> ড্যাশবোর্ড</div>
            <div class="sidebar-item"><i class="fa-solid fa-moon"></i> ডার্ক মোড</div>
            <div class="sidebar-item"><i class="fa-solid fa-user-shield"></i> প্রাইভেসি</div>
            <div class="sidebar-item"><i class="fa-solid fa-circle-info"></i> সাহায্য</div>
        </div>
        <div class="sidebar-footer">
            <div class="sidebar-item logout-btn" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> লগআউট</div>
        </div>
    </div>

    <div id="login-container" style="display:none; height: 100vh; justify-content: center; align-items: center;">
        <div class="card" style="width: 300px; text-align: center;">
            <h2 style="color: var(--accent-blue);">Ai Sphere</h2>
            <input type="text" id="user-input" placeholder="তোমার নাম" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:#222; color:white; text-align:center;">
            <button class="btn" onclick="login()">অ্যাক্সেস করুন</button>
        </div>
    </div>

    <div id="home-page" style="display:none;">
        <div class="nav-bar">
            <a class="nav-item active" onclick="showSection('home-view', this)"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a class="nav-item" onclick="showSection('reels-view', this)"><i class="fa-solid fa-bolt"></i><span>Reels</span></a>
            <a class="nav-item" onclick="showSection('friends-view', this)"><i class="fa-solid fa-user-plus"></i><span>Friends</span></a>
            <a class="nav-item" onclick="showSection('dashboard-view', this)"><i class="fa-solid fa-wallet"></i><span>Stats</span></a>
            <a class="nav-item" onclick="showSection('profile-view', this)"><i class="fa-solid fa-fingerprint"></i><span>Profile</span></a>
        </div>

        <div class="main-content">
            <div id="home-view" class="view-section active">
                <div class="earth-wrapper">
                    <img src="https://i.postimg.cc/t45s6sb2/1778359158913.png" alt="3D Earth" class="main-earth-img">
                    <div class="photo-orbit">
                        <div class="mini-pic p1"></div><div class="mini-pic p2"></div>
                        <div class="mini-pic p3"></div><div class="mini-pic p4"></div>
                    </div>
                </div>
                <h2 id="display-name" style="margin-top: 30px; letter-spacing: 3px;">WELCOME</h2>
            </div>
            <div id="dashboard-view" class="view-section"><div class="card"><h3>৳ 1250</h3><p>আপনার ব্যালেন্স</p></div></div>
            <div id="chat-view" class="view-section"><div class="card"><h3>Messages</h3><p>কোনো নতুন মেসেজ নেই।</p></div></div>
            <div id="reels-view" class="view-section"><div class="card"><h3>Reels</h3><p>লোডিং রিলস...</p></div></div>
            <div id="friends-view" class="view-section"><div class="card"><h3>Friends</h3><p>ফ্রেন্ড লিস্ট খালি।</p></div></div>
            <div id="profile-view" class="view-section"><div class="card"><h3>সাকিব</h3><p>CEO, Ai Sphere</p></div></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const ss = document.getElementById('splash-screen');
            ss.style.opacity = '0';
            setTimeout(() => { ss.style.display = 'none'; document.getElementById('login-container').style.display = 'flex'; }, 1000);
        }, 2000);

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function login() {
            const name = document.getElementById('user-input').value;
            if(name) document.getElementById('display-name').innerText = "স্বাগতম, " + name.toUpperCase();
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('top-header').style.display = 'flex';
        }

        function showSection(id, element) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(element) element.classList.add('active');
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }
    </script>
</body>
</html>
